services:
  - type: web
    name: chronis-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-vercel-project.vercel.app # TODO: Update this after Vercel deployment
