<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Silver Rim with 3D gradient -->
  <circle cx="50" cy="55" r="38" stroke="url(#silverGrad)" stroke-width="8" fill="#050505" />
  
  <!-- Pendant Attachment Loop -->
  <rect x="42" y="5" width="16" height="18" rx="6" stroke="url(#silverGrad)" stroke-width="6" fill="none" />
  <circle cx="50" cy="5" r="3" fill="#050505" />
  <rect x="44" y="23" width="12" height="4" fill="#94A3B8" />
  
  <!-- Inner Glass Purple Glow -->
  <circle cx="50" cy="55" r="34" fill="url(#purpleGlow)" opacity="0.6" />
  
  <!-- Inner Glass Reflection / Highlight -->
  <path d="M 22 55 A 28 28 0 0 1 78 55" stroke="url(#highlightGrad)" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  
  <!-- Minimalist Core Indicator -->
  <circle cx="50" cy="55" r="3" fill="#A78BFA" opacity="0.8" />
  
  <defs>
    <!-- Premium Silver Metallic Gradient -->
    <linearGradient id="silverGrad" x1="10" y1="10" x2="90" y2="90">
      <stop stop-color="#FFFFFF" />
      <stop offset="0.3" stop-color="#94A3B8" />
      <stop offset="0.7" stop-color="#475569" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Deep Purple Center Glow -->
    <radialGradient id="purpleGlow" cx="50" cy="55" r="34">
      <stop stop-color="#7C3AED" stop-opacity="0.8" />
      <stop offset="0.6" stop-color="#4C1D95" stop-opacity="0.3" />
      <stop offset="1" stop-color="#050505" stop-opacity="0" />
    </radialGradient>
    
    <!-- Glass Reflection Gradient -->
    <linearGradient id="highlightGrad" x1="22" y1="55" x2="78" y2="55">
      <stop stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="1" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>
</svg>